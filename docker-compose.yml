services:
  main-agent:
    build:
      context: .
      dockerfile: Dockerfile.main
    container_name: main-agent
    env_file:
      - ./.env
    volumes:
      - ./data/chromadb:/app/data/chromadb
      - ./data/profiles:/app/data/profiles
      - ./data/runtime:/app/data/runtime
    restart: unless-stopped

  research-agent:
    build:
      context: .
      dockerfile: Dockerfile.research
    container_name: research-agent
    env_file:
      - ./.env
    volumes:
      - ./data/runtime:/app/data/runtime
    restart: unless-stopped
