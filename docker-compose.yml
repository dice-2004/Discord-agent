services:
  main-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.main
    container_name: main-agent
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
    depends_on:
      - research-agent
    restart: unless-stopped

  research-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.research
    container_name: research-agent
    env_file:
      - ./.env
    volumes:
      - ./data/runtime:/app/data/runtime
      - ./data/audit:/app/data/audit
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles:
      - gemma
      - voice
    env_file:
      - ./.env
    volumes:
      - ./data/ollama:/root/.ollama
      - ./docker/Modelfile.gemma4-e4b:/Modelfile.gemma4-e4b
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  voice-stt-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.voice_stt
    container_name: voice-stt-agent
    profiles:
      - voice
    ports:
      - "8095:8095"
    env_file:
      - ./.env
    volumes:
      - ./data/runtime:/app/data/runtime
      - ./data/audit:/app/data/audit
    depends_on:
      - ollama
    restart: unless-stopped
