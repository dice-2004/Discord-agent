services:
  main-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_GEMINI_CLI: "false"
    container_name: main-agent
    env_file:
      - ./.env
    volumes:
      - ./data/chromadb:/app/data/chromadb
      - ./data/profiles:/app/data/profiles
      - ./data/runtime:/app/data/runtime
    restart: unless-stopped

  research-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_GEMINI_CLI: "true"
    container_name: research-agent
    command: ["sh", "-lc", "mkdir -p \"$HOME/.gemini\" && python -m research_agent.research_agent_server"]
    environment:
      - HOME=/app/data/runtime/gemini_home
    env_file:
      - ./.env
    volumes:
      - ./data/runtime:/app/data/runtime
    restart: unless-stopped
