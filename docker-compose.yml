services:
  main-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.main
    container_name: main-agent
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    depends_on:
      - research-agent
    restart: unless-stopped

  research-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.research
    container_name: research-agent
    env_file:
      - ./.env
    volumes:
      - ./data/runtime:/app/data/runtime
      - ./data/audit:/app/data/audit
      - ./src:/app/src
    restart: unless-stopped
