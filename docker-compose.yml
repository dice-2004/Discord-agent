services:
  discord-ai-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-ai-agent
    env_file:
      - ./.env
    volumes:
      - ./data/chromadb:/app/data/chromadb
      - ./data/profiles:/app/data/profiles
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    env_file:
      - ./.env
    environment:
      - N8N_HOST=${N8N_HOST:-0.0.0.0}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-change_me_now}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-change_this_32_chars_min}
      - TZ=${TZ:-Asia/Tokyo}
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data:
